<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMIR PANEL V5 ULTRA</title>
<style>
*{box-sizing:border-box;font-family:Arial;}
body{margin:0;background:#0b0b0f;color:gold;height:100vh;transition:0.3s;}
body.light{background:#f5f5f5;color:#b8860b;}
#login{height:100vh;display:flex;justify-content:center;align-items:center;}
.login-box{width:320px;padding:25px;border-radius:15px;background:rgba(255,255,255,0.05);box-shadow:0 0 25px rgba(255,215,0,0.15);text-align:center;}
.login-box input{width:100%;padding:10px;margin:8px 0;border:none;border-radius:10px;outline:none;}
.login-box button{width:100%;padding:10px;border:none;border-radius:10px;background:gold;font-weight:bold;cursor:pointer;}
#app{display:none;height:100vh;flex-direction:column;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:15px;}
.icon{font-size:22px;cursor:pointer;}
.title{font-size:24px;font-weight:bold;text-shadow:0 0 10px gold;}
.themeBtn{font-size:18px;cursor:pointer;}
.container{flex:1;display:flex;justify-content:center;align-items:center;padding:10px;}
.box{width:95%;max-width:650px;background:#111;border-radius:15px;padding:15px;overflow:auto;box-shadow:0 0 25px rgba(255,215,0,0.25);}
body.light .box{background:#fff;}
.config{color:#00ff6a;font-size:13px;word-break:break-all;margin-bottom:10px;}
.btnArea{display:flex;justify-content:center;gap:15px;margin-top:10px;}
.bigBtn{padding:14px 25px;font-size:18px;border:none;border-radius:12px;cursor:pointer;font-weight:bold;}
.gold{background:gold;color:black;}
.gray{background:#333;color:gold;}
.footer{display:flex;justify-content:center;align-items:center;gap:8px;padding:10px;border-top:1px solid rgba(255,215,0,0.2);}
.drawer{position:fixed;top:0;right:-100%;width:70%;max-width:320px;height:100%;background:#111;padding:20px;transition:0.3s;z-index:10;}
.drawer.open{right:0;}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;}
.overlay.show{display:block;}
.item{padding:12px;margin:10px 0;background:rgba(255,255,255,0.05);border-radius:10px;cursor:pointer;}
</style>
</head>
<body>

<div id="login">
<div class="login-box">
<h2>AMIR LOGIN</h2>
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="app">
<div class="topbar">
<div class="icon" onclick="openDrawer()">⚙️</div>
<div class="title">AMIR PANEL V5</div>
<div class="themeBtn" onclick="toggleTheme()">🌗</div>
</div>

<div class="container">
<div class="box">
<div id="configBox" class="config">Loading...</div>
</div>
</div>

<div class="btnArea">
<button class="bigBtn gold" onclick="next()">NEXT</button>
<button class="bigBtn gray" onclick="copy()">COPY</button>
</div>

<div class="footer">
<span>✈️</span>
<span>@Net_Pulseee</span>
</div>
</div>

<div class="drawer" id="drawer">
<h3>MENU</h3>
<div class="item">⚙️ Settings</div>
<div class="item">📞 Support</div>
<div class="item">📢 Telegram Channel</div>
<button class="gray" onclick="closeDrawer()">Close</button>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<script>
function login(){
if(document.getElementById("pass").value==="amir"){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";
loadConfigs(); 
}else alert("Wrong password");
}

function toggleTheme(){
document.body.classList.toggle("light");
}

let configs = [];
let i = 0;

// 🔄 تابع جدید: خواندن اطلاعات از فایل آنلاین data.json
function loadConfigs() {
    fetch('data.json')
    .then(response => response.json())
    .then(data => {
        configs = data.configs;
        if(configs.length === 0) {
            document.getElementById("configBox").innerText = "هنوز کانفیگی ثبت نشده است! ❌";
        } else {
            i = 0;
            show();
        }
    })
    .catch(err => {
        document.getElementById("configBox").innerText = "خطا در دریافت فایل دیتای آنلاین! ⚠️";
        console.error(err);
    });
}

function show(){
if(configs.length > 0) {
    document.getElementById("configBox").innerText = configs[i];
}
}

function next(){
if(configs.length === 0) return;
i++;
if(i >= configs.length) i = 0;
show();
}

function copy(){
if(configs.length === 0) return;
navigator.clipboard.writeText(configs[i]);
alert("کانفیگ کپی شد! 📋");
}

function openDrawer(){
document.getElementById("drawer").classList.add("open");
document.getElementById("overlay").classList.add("show");
}

function closeDrawer(){
document.getElementById("drawer").classList.remove("open");
document.getElementById("overlay").classList.remove("show");
}
</script>
</body>
</html>
